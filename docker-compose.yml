services:
  inferno:
    build:
      context: ./
    ports:
      - "${INFERNO_PORT}:4567"
    mem_reservation: 256m
    mem_limit: 512m
    container_name: inferno
    volumes:
      - ${INFERNO_VOLUME}:/opt/inferno/data
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build:
      context: ./
    mem_reservation: 256m
    mem_limit: 512m
    volumes:
      - ${WORKER_VOLUME}:/opt/inferno/data
    command: bundle exec sidekiq -r ./worker.rb
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  hl7_validator_service:
    extends:
      file: docker-compose.background.yml
      service: hl7_validator_service
#  validator_service:
#    extends:
#      file: docker-compose.background.yml
#      service: validator_service
#  fhir_validator_app:
#    extends:
#      file: docker-compose.background.yml
#      service: fhir_validator_app
  fhirpath:
    extends:
      file: docker-compose.background.yml
      service: fhirpath
  redis:
    extends:
      file: docker-compose.background.yml
      service: redis
