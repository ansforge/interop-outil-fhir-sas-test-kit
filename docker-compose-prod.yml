services:
  inferno:
    build:
      context: ./
      args: 
        - http_proxy=http://grpxy-vip.grita.fr:3128
        - https_proxy=http://grpxy-vip.grita.fr:3128
    mem_reservation: ${MEMORY_RESERVATION:-256m}
    mem_limit: ${MEMORY_LIMIT:-512m}
    container_name: inferno
    env_file:
      - .env.production
    environment:
      INFERNO_HOST: ${INFERNO_HOST}
    volumes:
      - ${INFERNO_VOLUME}:/opt/inferno/data
      - ${CERT_VOLUME}:/opt/inferno/config/cert
    depends_on:
      - redis
    network_mode: "host"

  worker:
    build:
      context: ./
      args: 
        - http_proxy=http://grpxy-vip.grita.fr:3128
        - https_proxy=http://grpxy-vip.grita.fr:3128
    mem_reservation: ${MEMORY_WORKER_RESERVATION:-256m}
    mem_limit: ${MEMORY_WORKER_LIMIT:-512m}
    env_file:
      - .env.production
    environment:
      INFERNO_HOST: ${INFERNO_HOST}
    volumes:
      - ${WORKER_VOLUME}:/opt/inferno/data
      - ${CERT_VOLUME}:/opt/inferno/config/cert
    command: bundle exec sidekiq -r ./worker.rb
    depends_on:
      - redis
    network_mode: "host"

  hl7_validator_service:
    extends:
      file: docker-compose.background.yml
      service: hl7_validator_service
    network_mode: "host"
#  validator_service:
#    extends:
#      file: docker-compose.background.yml
#      service: validator_service
#  fhir_validator_app:
#    extends:
#      file: docker-compose.background.yml
#      service: fhir_validator_app
  fhirpath:
    extends:
      file: docker-compose.background.yml
      service: fhirpath
    network_mode: "host"
  redis:
    extends:
      file: docker-compose.background.yml
      service: redis
    network_mode: "host"
