version: '3'
services:
  hl7_validator_service:
    image: infernocommunity/inferno-resource-validator
    mem_reservation: 2g
    mem_limit: 3g
    environment:
      # Defines how long validator sessions last if unused, in minutes:
      # Negative values mean sessions never expire, 0 means sessions immediately expire
      SESSION_CACHE_DURATION: -1
    volumes:
      - ${HL7_VALIDATOR_VOLUME}:/app/igs
      # To let the service share your local FHIR package cache,
      # uncomment the below line
      # - ~/.fhir:/home/ktor/.fhir
  validator_service:
    image: infernocommunity/fhir-validator-service
    # Update this path to match your directory structure
    volumes:
      - ${VALIDATOR_VOLUME}:/home/igs
  fhir_validator_app:
    image: infernocommunity/fhir-validator-app
    depends_on:
      - validator_service
    environment:
      EXTERNAL_VALIDATOR_URL: ${VALIDATOR_URL}
      VALIDATOR_BASE_PATH: /validator
  fhirpath:
    image: infernocommunity/fhirpath-service:v0.0.1
    mem_reservation: 256m
    mem_limit: 512m
    ports:
      - "${FHIRPATH_PORT}:6789"
  nginx:
    image: nginx
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf
      - ./config/cert/inferno:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    command: [nginx, '-g', 'daemon off;']
    depends_on:
      - hl7_validator_service
      - fhirpath
  redis:
    image: redis
    mem_reservation: 64m
    mem_limit: 128m
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
